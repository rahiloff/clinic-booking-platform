name: docbook
description: A production-grade healthcare booking platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  go_router: ^13.0.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.6
  google_fonts: ^6.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
