# ==========================================
# Doctor Booking Platform - Docker Compose
# ==========================================
# Usage:
#   docker compose up -d          (start all)
#   docker compose up backend -d  (start one)
#   docker compose logs -f backend
#   docker compose down
# ==========================================

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: docbook_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docbook_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-docbook}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docbook} -d ${POSTGRES_DB:-docbook}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - docbook_net
    restart: unless-stopped

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: docbook_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - docbook_net
    restart: unless-stopped

  # ---- FastAPI Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docbook_backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - docbook_net
    restart: unless-stopped

  # ---- Celery Worker ----
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docbook_worker
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    networks:
      - docbook_net
    restart: unless-stopped

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:1.27-alpine
    container_name: docbook_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
    networks:
      - docbook_net
    restart: unless-stopped

# ---- Volumes ----
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---- Networks ----
networks:
  docbook_net:
    driver: bridge
